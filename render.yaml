services:
  - type: web
    name: mystore-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_PORT
        value: 3001
      - key: CLIENT_SITE_URL
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ACCESS_KEY
        sync: false
      - key: JWT_REFRESH_KEY
        sync: false
      - key: JWT_RESET_PASS_KEY
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DEFAULT_USER_IMG
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_SECRET_KEY
        sync: false
      - key: SEED_SECRET
        sync: false
